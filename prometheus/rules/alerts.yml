groups:
  - name: host_alerts
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          category: host
        annotations:
          summary: "CPU tinggi di {{ $labels.instance }}"
          description: "CPU usage {{ $value | humanize }}% selama 5 menit terakhir"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: host
        annotations:
          summary: "RAM tinggi di {{ $labels.instance }}"
          description: "Memory usage {{ $value | humanize }}%"

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
          category: host
        annotations:
          summary: "Disk hampir penuh di {{ $labels.mountpoint }}"
          description: "Disk usage {{ $value | humanize }}% di {{ $labels.mountpoint }}"

      - alert: HostDown
        expr: up{job="node"} == 0
        for: 2m
        labels:
          severity: critical
          category: host
        annotations:
          summary: "Host {{ $labels.instance }} DOWN"
          description: "node-exporter gak respond > 2 menit"

  - name: container_alerts
    interval: 30s
    rules:
      - alert: ContainerHighCPU
        expr: (sum by (name) (rate(container_cpu_usage_seconds_total{name!=""}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} CPU tinggi"
          description: "CPU {{ $value | humanize }}% > 10 menit"

      - alert: ContainerHighMemory
        expr: |
          (container_memory_working_set_bytes{name!=""}
            / on(name) (container_spec_memory_limit_bytes{name!=""} > 0)
          ) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} RAM tinggi"
          description: "Memory {{ $value | humanize }}% dari limit"

      - alert: ContainerRestartingFrequently
        expr: changes(container_start_time_seconds{name!=""}[15m]) > 2
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} sering restart"
          description: "Container restart {{ $value }}x dalam 15 menit"

      - alert: ContainerOOMKilled
        expr: increase(container_oom_events_total{name!=""}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "Container {{ $labels.name }} OOM-killed"
          description: "Out of memory kill terdeteksi (cek memory limit / leak)"

  - name: service_alerts
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          category: monitoring
        annotations:
          summary: "Prometheus DOWN"
          description: "Self-monitoring gagal — observability bermasalah"

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
          category: monitoring
        annotations:
          summary: "Loki DOWN"
          description: "Log collection berhenti"
