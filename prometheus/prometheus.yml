global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'dealtech-monitor'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Host metrics (CPU/RAM/disk/network)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'vps'

  # Per-container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Drop metric yang gak penting biar hemat storage
      - source_labels: [__name__]
        regex: 'container_(network_tcp_usage_total|tasks_state|memory_failures_total|network_udp_usage_total)'
        action: drop

  # Loki (untuk monitor stack itu sendiri)
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
