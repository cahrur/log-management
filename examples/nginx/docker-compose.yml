# Contoh docker-compose.yml - Nginx dengan Pantra
# Access log dan error log otomatis ke Promtail

name: myapp-nginx

networks:
  app-net:
    driver: bridge
  observability:
    name: pantra
    external: true

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app-net
      - observability
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    labels:
      - "logging=promtail"
      - "team=${TEAM_NAME:-infra}"
      - "project=${PROJECT_NAME:-myapp}"
      - "service=nginx"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "nginx"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Upstream app (contoh)
  app:
    image: your-app:latest
    container_name: nginx-upstream
    restart: unless-stopped
    networks:
      - app-net
      - observability
    labels:
      - "logging=promtail"
      - "team=${TEAM_NAME:-backend}"
      - "project=${PROJECT_NAME:-myapp}"
      - "service=app"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
